name: sing-box

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "The tag version you want to build"
        required: true
        type: string
        default: "v1.13.2"

env:
  APP_NAME: sing-box

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Clone Repo
        working-directory: ${{ env.APP_NAME }}
        run: |
          git clone --depth=1 -b ${{ inputs.tag_name }} https://github.com/SagerNet/sing-box.git src
          echo "tag_name: ${{ inputs.tag_name }}"
          echo "app_name: ${{ env.APP_NAME }}"

