name: image-build

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "The tag(version) you want to build"
        required: true
        type: string
        default: "v1.13.2"
      app_name:
        description: "The project name you want to build"
        required: true
        default: 'sing-box'
        type: choice
        options:
          - sing-box
          - nginx-proxy
          - nginx-http

env:
  APP_NAME: ${{ github.event.inputs.app_name }}
  TAG_NAME: ${{ github.event.inputs.tag_name }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize
        working-directory: ${{ env.APP_NAME }}
        run: |
          echo "--- 正在处理 $APP_NAME ---"
          
          case "$APP_NAME" in
            "sing-box")
              echo "Clone sing-box..."
              git clone --depth=1 -b ${TAG_NAME} https://github.com/SagerNet/sing-box.git src
              ls src
              ;;
            nginx-*)
              if [ -f "./Dockerfile" ]; then
                echo "Change Dockerfile..."
                sed -i "s@FROM nginx.*alpine@FROM nginx:${TAG_NAME}@" ./Dockerfile
                cat ./Dockerfile | grep "FROM nginx"
              else
                echo "❌ 没有找到 Dockerfile 文件"
                exit 1
              fi
              ;;
            *)
              echo "❌ 不支持的项目名称: $APP_NAME"
              exit 1
              ;;
          esac

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          context: ./${{ env.APP_NAME }}
          build-args: |
            VERSION=${{ env.TAG_NAME }}
            SRC_DIR=src
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_REGISTRY }}/${{ env.APP_NAME }}:${{ env.TAG_NAME }}
            ${{ secrets.DOCKERHUB_REGISTRY }}/${{ env.APP_NAME }}:latest

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.MY_TOKEN }}
          RELEASE_TAG: ${{ env.APP_NAME }}/${{ env.TAG_NAME}}
          RELEASE_TITLE: ${{ env.APP_NAME }}/${{ env.TAG_NAME}}
          RELEASE_NOTES: "Build from ${{ env.APP_NAME }}:${{ env.TAG_NAME }}"
        run: |
          echo "--- 正在处理 Release $RELEASE_TAG ---"    
          # 检查 Release 是否已经存在
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release 已存在，跳过..."
          else
            echo "创建新 Release..."
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --notes "$RELEASE_NOTES"
          fi

  clean:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Clean Releases by APP
        env:
          GH_TOKEN: ${{ secrets.MY_TOKEN }}
          KEEP_RELEASES: 3
        run: |
          REL_SKIP=$((KEEP_RELEASES + 1))

          echo "--- 正在清理旧的 Release 和 Tag ---"
          RELEASES=$(gh release list --limit 100 --json tagName,isLatest \
            --jq ".[] | select(.isLatest == false and (.tagName | startswith(\"$APP_NAME\"))) | .tagName" \
            | tail -n +"$REL_SKIP") 
          
          if [ -n "$RELEASES" ]; then
            echo "发现待删除 Release:
          $RELEASES"
            echo "$RELEASES" | xargs -r -I % -n 1 gh release delete % --yes --cleanup-tag
          else
            echo "✅ 没有需要删除的 Release"
          fi