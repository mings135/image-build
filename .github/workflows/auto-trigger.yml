name: auto-trigger

on:
  schedule:
    - cron: "20 20 * * *"
  workflow_dispatch:

permissions:
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - name: sing-box
    
    env:
      APP_NAME: ${{ matrix.name }}
      SHOULD_RELEASE: no
      TAG_NAME: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash "${APP_NAME}/auto.sh"
      
      - name: Trigger Workflow
        if: env.SHOULD_RELEASE == 'yes'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$TAG_NAME" ]; then
            gh workflow run image-build.yml --ref main \
              -f tag_name="$TAG_NAME" \
              -f app_name="$APP_NAME"
          else
            echo "❌ 没有找到 tag_name"
            exit 1
          fi
      
  clean:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Clean Workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP_WORKFLOWS: 12
        run: |
          echo "--- 正在清理旧的 Workflow 运行记录 ---"            
          RUN_IDS=$(gh run list --limit 100 \
            --status completed --json databaseId \
            --jq ".[${KEEP_WORKFLOWS}:].[] | .databaseId")
          
          if [ -n "$RUN_IDS" ]; then
            echo "发现待删除运行记录 ID: 
          $RUN_IDS"
            echo "$RUN_IDS" | xargs -r -I % -n 1 gh run delete %
          else
            echo "✅ 没有需要删除的运行记录"
          fi